---
driver:
  name: dokken
  privileged: true
  chef_image: chef/chef
  chef_version: current

provisioner:
  name: dokken

verifier:
  name: inspec
  sudo: true

transport:
  name: dokken

platforms:
  - name: amazonlinux-2023
    driver:
      image: dokken/amazonlinux-2023
      pid_one_command: /usr/lib/systemd/systemd
  - name: debian-12
    driver:
      image: dokken/debian-12
      pid_one_command: /bin/systemd
  - name: debian-13
    driver:
      image: dokken/debian-13
      pid_one_command: /usr/lib/systemd/systemd
  - name: rockylinux-9
    driver:
      image: dokken/rockylinux-9
      pid_one_command: /usr/lib/systemd/systemd
  - name: ubuntu-2204
    driver:
      image: dokken/ubuntu-22.04
      pid_one_command: /bin/systemd
  - name: ubuntu-2404
    driver:
      image: dokken/ubuntu-24.04
      pid_one_command: /bin/systemd

x-run_lists:
  default: &default_run_list
    - recipe[test::default]
  client: &client_run_list
    - recipe[test::client]
  server: &server_run_list
    - recipe[test::server]

x-verifiers:
  default: &default_verifier
    inspec_tests:
      - path: test/integration/default
  client: &client_verifier
    inspec_tests:
      - path: test/integration/client
  server: &server_verifier
    inspec_tests:
      - path: test/integration/server

suites:
  - name: default
    run_list: *default_run_list
    verifier: *default_verifier
  - name: client
    run_list: *client_run_list
    verifier: *client_verifier
  - name: server
    run_list: *server_run_list
    verifier: *server_verifier
